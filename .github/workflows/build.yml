name: CI Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        lua:
          - luajit
          - lua5.1
          - lua5.2
          - lua5.3
          - lua5.4
          - lua5.5
          - luaj-jse-2.0.3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Lua and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential luarocks curl

          sudo luarocks install luacheck

          if [ "${{ matrix.lua }}" = "luajit" ]; then
            sudo apt-get install -y luajit libluajit-5.1-dev
            echo "LUA_CMD=luajit" >> $GITHUB_ENV

          elif [ "${{ matrix.lua }}" = "lua5.1" ]; then
            sudo apt-get install -y lua5.1 liblua5.1-0-dev
            echo "LUA_CMD=lua5.1" >> $GITHUB_ENV

          elif [ "${{ matrix.lua }}" = "lua5.2" ]; then
            sudo apt-get install -y lua5.2 liblua5.2-dev
            echo "LUA_CMD=lua5.2" >> $GITHUB_ENV

          elif [ "${{ matrix.lua }}" = "lua5.3" ]; then
            sudo apt-get install -y lua5.3 liblua5.3-dev
            echo "LUA_CMD=lua5.3" >> $GITHUB_ENV

          elif [ "${{ matrix.lua }}" = "lua5.4" ]; then
            sudo apt-get install -y lua5.4 liblua5.4-dev
            echo "LUA_CMD=lua5.4" >> $GITHUB_ENV

          elif [ "${{ matrix.lua }}" = "lua5.5" ]; then
            echo "LUA_CMD=lua5.5" >> $GITHUB_ENV

          elif [ "${{ matrix.lua }}" = "luaj-jse-2.0.3" ]; then
            sudo apt-get install -y openjdk-17-jre

            mkdir -p $HOME/luaj
            curl -L \
              -o $HOME/luaj/luaj.jar \
              https://repo1.maven.org/maven2/org/luaj/luaj-jse/2.0.3/luaj-jse-2.0.3.jar

            echo "LUA_CMD=java -cp $HOME/luaj/luaj.jar lua" >> $GITHUB_ENV
          fi

      - name: Clone and build grug-tests
        run: |
          git clone https://github.com/grug-lang/grug-tests
          cd grug-tests
          cmake -S . -B build
          cmake --build build

      - name: Generate amalgamation
        if: matrix.lua == 'luajit'
        run: python amalgamate.py

      - name: Ensure amalgamation is up-to-date
        if: matrix.lua == 'luajit'
        run: git diff --exit-code

      - name: Run tests
        if: matrix.lua == 'luajit'
        run: $LUA_CMD tests.lua "" ./grug-tests

      - name: Run Lua example (minimal)
        run: |
          cd examples/minimal
          $LUA_CMD example.lua

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
