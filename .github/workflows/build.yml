name: CI Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        lua:
          - luajit
          - lua5.1
          - lua5.2
          - lua5.3
          - lua5.4
          - luaj-jse-2.0.3
          - luajit-remake

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Lua and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential luarocks curl meson ninja-build

          sudo luarocks install luacheck

          if [ "${{ matrix.lua }}" = "luajit" ]; then
            sudo apt-get install -y luajit libluajit-5.1-dev
            echo "LUA_CMD=luajit" >> $GITHUB_ENV
          elif [ "${{ matrix.lua }}" = "lua5.1" ]; then
            sudo apt-get install -y lua5.1 liblua5.1-0-dev
            sudo luarocks --lua-version 5.1 install cffi-lua
            echo "LUA_CMD=lua5.1" >> $GITHUB_ENV
          elif [ "${{ matrix.lua }}" = "lua5.2" ]; then
            sudo apt-get install -y lua5.2 liblua5.2-dev
            sudo luarocks --lua-version 5.2 install cffi-lua
            echo "LUA_CMD=lua5.2" >> $GITHUB_ENV
          elif [ "${{ matrix.lua }}" = "lua5.3" ]; then
            sudo apt-get install -y lua5.3 liblua5.3-dev
            sudo luarocks --lua-version 5.3 install cffi-lua
            echo "LUA_CMD=lua5.3" >> $GITHUB_ENV
          elif [ "${{ matrix.lua }}" = "lua5.4" ]; then
            sudo apt-get install -y lua5.4 liblua5.4-dev
            sudo luarocks --lua-version 5.4 install cffi-lua
            echo "LUA_CMD=lua5.4" >> $GITHUB_ENV
          elif [ "${{ matrix.lua }}" = "luaj-jse-2.0.3" ]; then
            sudo apt-get install -y openjdk-17-jre

            mkdir -p $HOME/luaj
            curl -L \
              -o $HOME/luaj/luaj.jar \
              https://repo1.maven.org/maven2/org/luaj/luaj-jse/2.0.3/luaj-jse-2.0.3.jar

            echo "LUA_CMD=java -cp $HOME/luaj/luaj.jar lua" >> $GITHUB_ENV
          elif [ "${{ matrix.lua }}" = "luajit-remake" ]; then
            # Clone to a temporary directory to build it
            git clone https://github.com/luajit-remake/luajit-remake.git $HOME/luajit-remake
            
            # Fix Docker volume UID mismatch (GH runner is 1001, container user 'u' is 1000)
            # This prevents Git's "dubious ownership" panic and write permission errors.
            sudo chown -R 1000:1000 $HOME/luajit-remake
            
            cd $HOME/luajit-remake
            python3 ljr-build make release
            
            # The resulting binary is owned by UID 1000, so we need sudo to move and claim it
            sudo mv luajitr $GITHUB_WORKSPACE/luajitr
            sudo chown $USER:$USER $GITHUB_WORKSPACE/luajitr
            
            echo "LUA_CMD=$GITHUB_WORKSPACE/luajitr" >> $GITHUB_ENV
          fi

      - name: Clone and build grug-tests
        run: |
          # TODO: Remove `--branch add-code-reloading-test`
          git clone --branch add-code-reloading-test https://github.com/grug-lang/grug-tests
          cd grug-tests
          cmake -S . -B build
          cmake --build build

      - name: Generate amalgamation
        if: matrix.lua == 'luajit'
        run: python amalgamate.py

      - name: Ensure amalgamation is up-to-date
        if: matrix.lua == 'luajit'
        run: git diff --exit-code

      - name: Run tests
        if: matrix.lua != 'luaj-jse-2.0.3' && matrix.lua != 'luajit-remake'
        run: $LUA_CMD tests.lua "" ./grug-tests

      - name: Run all Lua examples
        if: matrix.lua != 'luajit-remake'
        run: |
          python3 run_examples.py

      - name: Run benchmarks
        if: matrix.lua == 'luajit' || matrix.lua == 'luajit-remake'
        run: |
          if [ "${{ matrix.lua }}" = "luajit" ]; then
            python run_benchmarks.py \
              --impl "luajit -jv" luajit.json \
              2>&1 | tee luajit.log

            # Remove `NYI: return to lower frame` lines from the log,
            # as they occur sporadically and can't be fixed by the code.
            # See https://github.com/grug-lang/grug-for-lua/issues/16
            CLEANED_LOG=$(sed '/NYI: return to lower frame/d' luajit.log)

            # Check if any other unexpected NYI strings remain.
            if echo "$CLEANED_LOG" | grep -q 'NYI'; then
                echo "ERROR: Unexpected NYI detected in LuaJIT trace output" >&2
                echo "$CLEANED_LOG" | grep 'NYI' >&2
                exit 1
            fi
          elif [ "${{ matrix.lua }}" = "luajit-remake" ]; then
            python run_benchmarks.py \
              --impl "$LUA_CMD" luajit-remake.json
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install LuaRocks + luacheck
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
